<!DOCTYPE html>
<html>
    <head>
        <title>Currency Conversion</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css"> </head>
    <body>
        <div class="card">
            <h2 class="form-title">Currency Conversion</h2>
            <form action="processCurrency.jsp" method="POST">
                <div class="form-group">
                    <label>Amount (in RM)</label>
                    <input type="number" name="amount" placeholder="0.00" required>
                </div>
                
                <div class="form-group">
                    <label>Convert to</label>
                    <select name="currencyType">
                        <option value="1">USD</option>
                        <option value="2">EURO</option>
                        <option value="3">JPY</option>
                        <option value="4">SGD</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <input type="submit" class="btn btn-submit" value="Submit">
                    <input type="reset" class="btn btn-cancel" value="Cancel">
                </div>
            </form>
        </div>
    </body>
</html>
